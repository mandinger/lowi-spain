name: Release on PR merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create release
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository at merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Read version from manifest.json
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(jq -r '.version' custom_components/lowi_spain/manifest.json)
          TAG="v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Manifest version: ${VERSION} (tag: ${TAG})"

      - name: Check whether this version was already released
        id: check
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.version.outputs.tag }} already exists - skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build integration zip
        if: steps.check.outputs.exists == 'false'
        shell: bash
        run: |
          set -euo pipefail
          cd custom_components/lowi_spain
          zip -r ../../lowi_spain.zip .

      - name: Create GitHub release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.event.pull_request.merge_commit_sha }}
          generate_release_notes: true
          files: lowi_spain.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
